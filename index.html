<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#101417">
  <title>RISK THE LOOT!</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="game" aria-live="polite">
    <header class="topbar">
      <div class="brand">
        <span class="brandMark">S</span>
        <div><strong>RISK THE LOOT!</strong><small>WORKSHOP 07</small></div>
      </div>
      <div class="resources">
        <div class="resource scrap"><i>⬡</i><div><b id="bankScrap">0</b><span>SCRAP</span></div></div>
        <div class="resource record"><i>▲</i><div><b id="bestDepth">0</b><span>BEST DEPTH</span></div></div>
      </div>
      <button id="soundButton" class="iconButton" aria-label="Toggle sound" title="Sound">♪</button>
    </header>

    <section id="baseView" class="view baseView active">
      <div class="workshopScene" aria-hidden="true">
        <div class="windowGlow"></div>
        <div class="pipe pipeA"></div>
        <div class="pipe pipeB"></div>
        <div class="forge"><span></span><i></i></div>
        <div class="rig">
          <div class="rigHead"><i></i></div>
          <div class="rigBody"><span></span></div>
          <div class="rigArm left"></div><div class="rigArm right"></div>
          <div class="rigLeg left"></div><div class="rigLeg right"></div>
        </div>
        <div class="scrapHeap"><i></i><i></i><i></i><i></i><i></i></div>
        <div class="floorLine"></div>
      </div>

      <div class="baseActions">
        <div class="upgradeDeck">
          <button id="upgradeChassis" class="upgradeCard chassisUpgrade">
            <span class="upgradeGlyph">♥</span><small>CHASSIS <b id="chassisLevel">0</b></small>
            <strong><b id="maxHpStat">100</b> HP</strong><em>⬡ <b id="chassisCost">30</b></em>
          </button>
          <button id="upgradeWeapon" class="upgradeCard weaponUpgrade">
            <span class="upgradeGlyph">✦</span><small>ARC CANNON <b id="weaponLevel">0</b></small>
            <strong><b id="damageStat">8</b> DMG</strong><em>⬡ <b id="weaponCost">35</b></em>
          </button>
          <button id="upgradeSalvage" class="upgradeCard salvageUpgrade">
            <span class="upgradeGlyph">◎</span><small>MAGNET <b id="salvageLevel">0</b></small>
            <strong><b id="magnetStat">85</b> RANGE</strong><em>⬡ <b id="salvageCost">40</b></em>
          </button>
        </div>
        <button id="startButton" class="primaryButton"><span>START EXPEDITION</span><i>›</i></button>
      </div>

      <div id="baseNotice" class="baseNotice" role="status"></div>
    </section>

    <section id="expeditionView" class="view expeditionView">
      <canvas id="world" aria-label="RISK THE LOOT expedition arena"></canvas>
      <div class="expeditionHud">
        <div class="healthBlock">
          <div class="healthLabel"><span>RIG</span><b id="healthText">100 / 100</b></div>
          <div class="healthTrack"><i id="healthFill"></i></div>
        </div>
        <div class="runMetrics">
          <div><span>⬡</span><b id="runScrap">0</b></div>
          <div><span>DEPTH</span><b id="depthText">1</b></div>
          <div class="riskMetric"><span>RISK</span><b id="riskText">LOW</b></div>
        </div>
        <button id="extractButton" class="extractButton"><span>↩</span><b>EXTRACT</b></button>
      </div>

      <div id="extractOverlay" class="extractOverlay">
        <div class="extractRing"><span id="extractCount">3</span></div>
        <b>EXTRACTION</b>
        <button id="cancelExtract" class="iconButton" aria-label="Cancel extraction" title="Cancel">×</button>
      </div>

      <div id="riskOverlay" class="riskOverlay" role="dialog" aria-modal="true" aria-labelledby="riskTitle">
        <div class="riskPanel">
          <small>DEPTH MILESTONE</small>
          <h2 id="riskTitle">BANK IT OR RISK IT?</h2>
          <div class="riskReadout"><span>Carrying <b id="riskScrap">0</b> scrap</span><span>Next multiplier <b id="nextMultiplier">x1.35</b></span></div>
          <div class="riskChoices">
            <button id="riskExtract" class="riskChoice extractChoice"><b>EXTRACT</b><span>Survive the countdown</span></button>
            <button id="riskPush" class="riskChoice pushChoice"><b>RISK IT</b><span>Elite incoming · better loot</span></button>
          </div>
        </div>
      </div>

      <div id="touchControls" class="touchControls" aria-hidden="true">
        <div id="joystick" class="joystick"><i id="joystickKnob"></i></div>
      </div>
      <button id="dashButton" class="dashButton" aria-label="Dash" title="Dash (Space)"><b>»</b><span>DASH</span></button>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
